<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --surface: rgba(255,255,255,0.02); --border: rgba(255,255,255,0.06);
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --faint: #475569; --ghost: #1e293b;
    --accent: #00d4aa; --accent-dim: rgba(0,212,170,0.15); --accent-border: rgba(0,212,170,0.3);
    --blue: #0033ad; --mono: 'JetBrains Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.2); border-radius: 3px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes gridPulse { 0%,100% { opacity: 0.03; } 50% { opacity: 0.06; } }
  @keyframes heroGlow { 0%,100% { opacity: 0.25; } 50% { opacity: 0.5; } }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px; animation: gridPulse 8s ease-in-out infinite;
  }
  .bg-glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse, rgba(0,51,173,0.15) 0%, transparent 70%);
    animation: heroGlow 6s ease-in-out infinite;
  }
  .content { position: relative; z-index: 1; }
  .header {
    border-bottom: 1px solid var(--border); padding: 14px 28px;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(20px); background: rgba(10,14,23,0.85);
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .header-logo {
    width: 30px; height: 30px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff; font-family: var(--mono);
  }
  .header-name { font-family: var(--mono); font-weight: 600; font-size: 13px; letter-spacing: -0.02em; }
  .gh-link {
    display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none;
    font-size: 12px; font-family: var(--sans); padding: 5px 12px; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s;
  }
  .gh-link:hover { border-color: var(--accent-border); color: var(--accent); }
  .hero { padding: 70px 28px 50px; max-width: 1200px; margin: 0 auto; text-align: center; animation: fadeIn 0.6s ease both; }
  .badge {
    display: inline-block; padding: 3px 14px; border-radius: 20px;
    background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.2);
    font-size: 11px; color: var(--accent); margin-bottom: 22px; font-family: var(--mono);
  }
  .hero h1 { font-size: clamp(30px, 5vw, 52px); font-weight: 700; font-family: var(--mono); line-height: 1.1; margin-bottom: 14px; letter-spacing: -0.04em; }
  .hero h1 .grad { background: linear-gradient(135deg, #00d4aa 0%, #0066ff 50%, #00d4aa 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: 15px; color: var(--dim); max-width: 560px; margin: 0 auto 36px; line-height: 1.7; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; max-width: 560px; margin: 0 auto 36px; }
  .stat { text-align: center; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; }
  .stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); background: linear-gradient(135deg, var(--accent), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-label { font-size: 10px; color: var(--dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em; }
  .search-wrap { max-width: 520px; margin: 0 auto; position: relative; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--faint); }
  .search-input {
    width: 100%; padding: 13px 14px 13px 40px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; font-size: 13px;
    color: var(--text); font-family: var(--sans); transition: all 0.3s ease;
  }
  .search-input::placeholder { color: var(--faint); }
  .search-input:focus { outline: none; border-color: rgba(0,212,170,0.5); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
  .filters { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 12px; }
  .lang-filters { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-bottom: 28px; }
  .fbtn {
    padding: 5px 12px; border-radius: 7px; font-size: 11px; font-family: var(--mono);
    background: var(--surface); color: var(--dim); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .fbtn:hover { background: var(--accent-dim); color: var(--accent); }
  .fbtn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
  .lbtn {
    padding: 3px 9px; border-radius: 5px; font-size: 10px; font-family: var(--mono);
    background: transparent; color: var(--faint); border: 1px solid transparent;
    cursor: pointer; transition: all 0.2s;
  }
  .lbtn:hover { color: var(--muted); }
  .lbtn.active { border-color: currentColor; }
  .result-count { font-size: 11px; color: var(--faint); font-family: var(--mono); text-align: center; margin-bottom: 18px; }
  .main { max-width: 1200px; margin: 0 auto; padding: 0 28px 70px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    padding: 18px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden;
  }
  .card:hover { background: linear-gradient(135deg, rgba(0,212,170,0.06) 0%, rgba(0,51,173,0.06) 100%); border-color: rgba(0,212,170,0.35); transform: translateY(-2px); }
  .card:hover .card-name { color: var(--accent); }
  .card:hover .card-arrow { color: var(--accent); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
  .card-name { font-size: 14px; font-weight: 600; font-family: var(--mono); letter-spacing: -0.02em; transition: color 0.3s; color: var(--text); }
  .lang-tag { font-size: 9px; padding: 2px 7px; border-radius: 16px; font-family: var(--mono); font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
  .card-bottom { font-size: 10px; color: var(--faint); display: flex; justify-content: space-between; align-items: center; }
  .card-arrow { transition: color 0.3s; }
  .empty { text-align: center; padding: 70px 0; color: var(--faint); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.4; }
  .footer { border-top: 1px solid var(--border); padding: 36px 28px; text-align: center; }
  .footer-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 14px; }
  .footer-pfp { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent-border); }
  .footer-name { font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .footer-sub { font-size: 10px; color: var(--dim); }
  .footer p { font-size: 11px; color: var(--faint); max-width: 460px; margin: 0 auto 16px; line-height: 1.6; }
  .footer-links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .footer-links a { font-size: 11px; text-decoration: none; font-family: var(--mono); }
  .footer-links a.primary { color: var(--accent); }
  .footer-links a.secondary { color: var(--dim); }
  .footer-ts { margin-top: 20px; font-size: 10px; color: var(--ghost); font-family: var(--mono); }
  @media (max-width: 640px) {
    .header { padding: 12px 16px; }
    .hero { padding: 50px 16px 36px; }
    .main { padding: 0 16px 50px; }
    .grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
